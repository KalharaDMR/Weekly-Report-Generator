services:
  postgres:
    image: postgres:17
    container_name: weekly-report-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weekly_report_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: weekly-report-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/weekly_report_db?schema=public
      JWT_SECRET: supersecretkey
      JWT_EXPIRES_IN: 7d
      PORT: 3000

volumes:
  postgres_data: